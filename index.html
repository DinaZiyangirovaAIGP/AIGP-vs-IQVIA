<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIGP vs IQVIA — Data Alignment Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root {
  --bg:#0f1117;
  --surface:#181c27;
  --surface2:#1e2333;
  --border:#2a2f42;
  --text:#e8eaf0;
  --muted:#6b7194;

  /* MANDATORY COLORS */
  --aigp:#9CA3AF;   /* grey */
  --iqvia:#38BDF8;  /* light blue */

  --pos:#34d399;
  --neg:#f87171;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
  font-size:12px;
  min-height:100vh;
  overflow-y:auto;
}

header{
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.legend{
  display:flex;
  gap:18px;
  color:var(--muted);
  font-size:11px;
}
.dot{width:8px;height:8px;border-radius:50%;}

.filters{
  padding:10px 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
select,button{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  font-size:12px;
  padding:5px 8px;
  border-radius:6px;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

.chart-panel{
  padding:16px 20px;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.kpi{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
}
.kpi label{
  font-size:9px;
  color:var(--muted);
}
.kpi .value{
  font-size:18px;
}

.chart-wrap canvas{
  max-height:380px;
}

.right{
  display:flex;
  flex-direction:column;
}
.table-wrap{
  flex:1;
  overflow:auto;
  border-bottom:1px solid var(--border);
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:6px 10px;
  border-bottom:1px solid var(--border);
}
th{
  position:sticky;
  top:0;
  background:var(--surface);
  color:var(--muted);
  font-size:9px;
}
tr:hover{background:rgba(255,255,255,0.03)}
.clickable{cursor:pointer}

@media (max-width:1200px){
  .main{grid-template-columns:1fr;}
  .chart-panel{
    border-right:none;
    border-bottom:1px solid var(--border);
  }
}
</style>
</head>

<body>

<header>
  <div>
    <strong>AIGP vs IQVIA — Data Alignment</strong><br/>
    <span style="color:var(--muted)">ABDI IBR.GLOBAL PH · Internal reconciliation view</span>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:var(--aigp)"></span> AIGP</span>
    <span><span class="dot" style="background:var(--iqvia)"></span> IQVIA</span>
  </div>
</header>

<div class="filters">
  <select id="monthSel" multiple></select>
  <select id="regionSel" multiple></select>
  <select id="skuSel" multiple></select>

  <!-- Indicator ONLY Units / KZT -->
  <select id="indicatorSel">
    <option value="units">Units</option>
    <option value="kzt">KZT</option>
  </select>

  <!-- RX / OTC separate -->
  <select id="rxOtcSel">
    <option value="all">RX + OTC</option>
    <option value="PRESC">RX</option>
    <option value="NPRES">OTC</option>
  </select>

  <button onclick="clearFilters()">Clear filters</button>
</div>

<div class="main">
  <div class="chart-panel">
    <div class="kpis">
      <div class="kpi"><label>Total AIGP Sales</label><div id="kA" class="value"></div></div>
      <div class="kpi"><label>Total IQVIA Sales</label><div id="kI" class="value"></div></div>
      <div class="kpi"><label>Deviation %</label><div id="kPct" class="value"></div></div>
      <div class="kpi"><label>Deviation Abs</label><div id="kAbs" class="value"></div></div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="right">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Region</th>
            <th>AIGP</th>
            <th>IQVIA</th>
            <th>Dev %</th>
            <th>Dev Abs</th>
          </tr>
        </thead>
        <tbody id="regionTable"></tbody>
      </table>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>SKU</th>
            <th>AIGP</th>
            <th>IQVIA</th>
            <th>Dev %</th>
            <th>Dev Abs</th>
          </tr>
        </thead>
        <tbody id="skuTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
/* =======================
   EMBEDDED SAMPLE DATA
   (structure ready for real data)
======================= */
const DATA = [
  {m:'2025-01',region:'ALMATY',sku:'TANFLEX',rx:'NPRES',a_u:1000,i_u:950,a_k:120000,i_k:115000},
  {m:'2025-02',region:'ALMATY',sku:'TANFLEX',rx:'NPRES',a_u:1100,i_u:1000,a_k:130000,i_k:120000},
  {m:'2025-01',region:'ASTANA',sku:'OSELTAMIVIR',rx:'PRESC',a_u:600,i_u:620,a_k:200000,i_k:210000}
];

const uniq=(k)=>[...new Set(DATA.map(d=>d[k]))];
const sum=(arr,k)=>arr.reduce((s,d)=>s+d[k],0);

const monthSel=document.getElementById('monthSel');
const regionSel=document.getElementById('regionSel');
const skuSel=document.getElementById('skuSel');
uniq('m').forEach(v=>monthSel.add(new Option(v,v)));
uniq('region').forEach(v=>regionSel.add(new Option(v,v)));
uniq('sku').forEach(v=>skuSel.add(new Option(v,v)));

let fRegion=null,fSku=null;

const ctx=document.getElementById('chart');
const chart=new Chart(ctx,{
  type:'line',
  data:{labels:[],datasets:[
    {label:'AIGP',borderColor:getCSS('--aigp'),data:[]},
    {label:'IQVIA',borderColor:getCSS('--iqvia'),data:[]}
  ]},
  options:{responsive:true,maintainAspectRatio:false}
});

function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v);}

function update(){
  const ind=indicatorSel.value;
  const rx=rxOtcSel.value;

  const months=[...monthSel.selectedOptions].map(o=>o.value);

  let base=DATA.filter(d=>
    (!fRegion||d.region===fRegion)&&
    (!fSku||d.sku===fSku)&&
    (rx==='all'||d.rx===rx)
  );

  /* KPI + TABLES -> month applied */
  const scoped=base.filter(d=>months.length===0||months.includes(d.m));

  const ak=sum(scoped,ind==='units'?'a_u':'a_k');
  const ik=sum(scoped,ind==='units'?'i_u':'i_k');

  kA.textContent=ak.toLocaleString();
  kI.textContent=ik.toLocaleString();
  kAbs.textContent=(ak-ik).toLocaleString();
  kPct.textContent=(ik?(ak-ik)/ik*100:0).toFixed(1)+'%';

  /* CHART -> full timeline */
  const labels=uniq('m');
  chart.data.labels=labels;
  chart.data.datasets[0].data=labels.map(m=>sum(base.filter(d=>d.m===m),ind==='units'?'a_u':'a_k'));
  chart.data.datasets[1].data=labels.map(m=>sum(base.filter(d=>d.m===m),ind==='units'?'i_u':'i_k'));
  chart.update();

  renderTable(regionTable,'region',scoped);
  renderTable(skuTable,'sku',scoped);
}

function renderTable(el,key,data){
  el.innerHTML='';
  uniq(key).map(v=>{
    const d=data.filter(x=>x[key]===v);
    const a=sum(d,indicatorSel.value==='units'?'a_u':'a_k');
    const i=sum(d,indicatorSel.value==='units'?'i_u':'i_k');
    return {v,a,i};
  })
  .sort((x,y)=>Math.abs(y.a-y.i)-Math.abs(x.a-x.i))
  .forEach(r=>{
    el.innerHTML+=`<tr class="clickable" onclick="toggle('${key}','${r.v}')">
      <td>${r.v}</td>
      <td>${r.a.toLocaleString()}</td>
      <td>${r.i.toLocaleString()}</td>
      <td>${(r.i?(r.a-r.i)/r.i*100:0).toFixed(1)}%</td>
      <td>${(r.a-r.i).toLocaleString()}</td>
    </tr>`;
  });
}

function toggle(k,v){
  if(k==='region')fRegion=fRegion===v?null:v;
  if(k==='sku')fSku=fSku===v?null:v;
  update();
}

function clearFilters(){
  fRegion=null;fSku=null;
  monthSel.selectedIndex=-1;
  rxOtcSel.value='all';
  indicatorSel.value='units';
  update();
}

document.querySelectorAll('select').forEach(s=>s.onchange=update);
update();
</script>

</body>
</html>
